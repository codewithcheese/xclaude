name: "Sandbox: python"
on:
  push:
    branches: [main]
    paths:
      - 'toolchains/python.sb'
      - 'toolchains/python.test.zsh'
      - '.github/workflows/test-python.yml'
  pull_request:
    branches: [main]
    paths:
      - 'toolchains/python.sb'
      - 'toolchains/python.test.zsh'
      - '.github/workflows/test-python.yml'

jobs:
  sandbox-python:
    name: "Sandbox: python"
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install pyenv + Python
        run: |
          brew install pyenv
          eval "$(pyenv init -)"
          pyenv install 3.12 --skip-existing
          pyenv global 3.12
      - run: zsh test_sandbox.zsh --toolchain python
