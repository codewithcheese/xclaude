name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      node: ${{ steps.filter.outputs.node }}
      pnpm: ${{ steps.filter.outputs.pnpm }}
      bun: ${{ steps.filter.outputs.bun }}
      uv: ${{ steps.filter.outputs.uv }}
      rust: ${{ steps.filter.outputs.rust }}
      go: ${{ steps.filter.outputs.go }}
      python: ${{ steps.filter.outputs.python }}
      deno: ${{ steps.filter.outputs.deno }}
      gh: ${{ steps.filter.outputs.gh }}
      huggingface: ${{ steps.filter.outputs.huggingface }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - 'base.sb'
              - 'xclaude.zsh'
              - 'test_sandbox.zsh'
              - 'test_xclaude.bash'
              - 'toolchains/test_helpers.zsh'
              - '.github/workflows/test.yml'
            node:
              - 'toolchains/node.sb'
              - 'toolchains/node.test.zsh'
            pnpm:
              - 'toolchains/pnpm.sb'
              - 'toolchains/pnpm.test.zsh'
            bun:
              - 'toolchains/bun.sb'
              - 'toolchains/bun.test.zsh'
            uv:
              - 'toolchains/uv.sb'
              - 'toolchains/uv.test.zsh'
            rust:
              - 'toolchains/rust.sb'
              - 'toolchains/rust.test.zsh'
            go:
              - 'toolchains/go.sb'
              - 'toolchains/go.test.zsh'
            python:
              - 'toolchains/python.sb'
              - 'toolchains/python.test.zsh'
            deno:
              - 'toolchains/deno.sb'
              - 'toolchains/deno.test.zsh'
            gh:
              - 'toolchains/gh.sb'
              - 'toolchains/gh.test.zsh'
            huggingface:
              - 'toolchains/huggingface.sb'
              - 'toolchains/huggingface.test.zsh'

  dsl-tests:
    name: DSL pipeline
    needs: changes
    if: needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash test_xclaude.bash

  sandbox-base:
    name: "Sandbox: base profile"
    needs: changes
    if: needs.changes.outputs.shared == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: zsh test_sandbox.zsh --toolchain none

  sandbox-node:
    name: "Sandbox: node"
    needs: changes
    if: needs.changes.outputs.shared == 'true' || needs.changes.outputs.node == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install NVM + Node
        run: |
          curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
          export NVM_DIR="$HOME/.nvm"
          source "$NVM_DIR/nvm.sh"
          nvm install --lts
      - run: zsh test_sandbox.zsh --toolchain node

  sandbox-pnpm:
    name: "Sandbox: pnpm"
    needs: changes
    if: needs.changes.outputs.shared == 'true' || needs.changes.outputs.pnpm == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        run: curl -fsSL https://get.pnpm.io/install.sh | sh -
      - run: zsh test_sandbox.zsh --toolchain pnpm

  sandbox-bun:
    name: "Sandbox: bun"
    needs: changes
    if: needs.changes.outputs.shared == 'true' || needs.changes.outputs.bun == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install Bun
        run: curl -fsSL https://bun.sh/install | bash
      - run: zsh test_sandbox.zsh --toolchain bun

  sandbox-uv:
    name: "Sandbox: uv"
    needs: changes
    if: needs.changes.outputs.shared == 'true' || needs.changes.outputs.uv == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - run: zsh test_sandbox.zsh --toolchain uv

  sandbox-rust:
    name: "Sandbox: rust"
    needs: changes
    if: needs.changes.outputs.shared == 'true' || needs.changes.outputs.rust == 'true'
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust via rustup
        run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      - run: zsh test_sandbox.zsh --toolchain rust

  sandbox-go:
    name: "Sandbox: go"
    needs: changes
    if: needs.changes.outputs.shared == 'true' || needs.changes.outputs.go == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      # go is preinstalled at /usr/local/go on macos-14
      - run: zsh test_sandbox.zsh --toolchain go

  sandbox-python:
    name: "Sandbox: python"
    needs: changes
    if: needs.changes.outputs.shared == 'true' || needs.changes.outputs.python == 'true'
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install pyenv + Python
        run: |
          brew install pyenv
          eval "$(pyenv init -)"
          pyenv install 3.12 --skip-existing
          pyenv global 3.12
      - run: zsh test_sandbox.zsh --toolchain python

  sandbox-deno:
    name: "Sandbox: deno"
    needs: changes
    if: needs.changes.outputs.shared == 'true' || needs.changes.outputs.deno == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install Deno
        run: curl -fsSL https://deno.land/install.sh | sh
      - run: zsh test_sandbox.zsh --toolchain deno

  sandbox-gh:
    name: "Sandbox: gh"
    needs: changes
    if: needs.changes.outputs.shared == 'true' || needs.changes.outputs.gh == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      # gh is preinstalled via homebrew on macos-14
      - run: zsh test_sandbox.zsh --toolchain gh
        env:
          GH_TOKEN: ${{ secrets.GH_PUBLIC_ONLY }}

  sandbox-huggingface:
    name: "Sandbox: huggingface"
    needs: changes
    if: needs.changes.outputs.shared == 'true' || needs.changes.outputs.huggingface == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install huggingface-cli
        run: pip3 install --break-system-packages huggingface_hub[cli]
      - run: zsh test_sandbox.zsh --toolchain huggingface
